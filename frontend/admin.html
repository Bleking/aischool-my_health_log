<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>건강 기록 관리자 페이</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;

            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .admin-container {
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            padding: 32px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.16);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            /* backdrop-filter: blur(10px); */
        }

        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 13px 14px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            outline: none;
            font-size: 16px;
        }
        input:focus {
            border: 2px solid #ffffff;
        }

        h1 {
            margin-top: 0;
        }

        .notice {
            margin: 24px 0;
            padding: 20px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.15);
            line-height: 1.7;
        }

        button {
            width: 100%;
            margin-top: 10px;
            padding: 14px;
            border: none;
            border-radius: 10px;

            font-size: 17px;
            font-weight: bold;
            cursor: pointer;

            background: white;
            color: #5b4bb7;
        }
        button:hover {
            background: #f1efff;
        }
        button:disabled {
            cursor: not-allowed;
            opacity: 0.65;
        }
    </style>
</head>

<body>
    <main class="admin-container">
        <h1>관리자 페이지</h1>

        <p id="welcome-message"></p>

        <section class="notice">
            관리자 로그인이 확인되었습니다.<br>
            전체 회원 조회 및 관리 기능은 추후 구현됩니다.
        </section>

        <button id="logout-button" type="button">
            로그아웃
        </button>
    </main>

    <script>
        const userId =
            sessionStorage.getItem("user_id");

        const userName =
            sessionStorage.getItem("user_name");

        const isAdmin =
            sessionStorage.getItem("is_admin");

        /*
         * 로그인하지 않았거나 일반 회원이면
         * 관리자 페이지 접근 차단
         */
        if (!userId || !userName) {
            alert("로그인이 필요합니다.");
            window.location.href = "/";

        } else if (isAdmin !== "true") {
            alert("관리자만 접근할 수 있습니다.");
            window.location.href = "/survey";

        } else {
            document.getElementById(
                "welcome-message"
            ).textContent =
                `${userName} 관리자님, 환영합니다.`;
        }

        document
            .getElementById("logout-button")
            .addEventListener("click", () => {
                sessionStorage.clear();
                window.location.href = "/";
            });
    </script>
</body>
</html>
