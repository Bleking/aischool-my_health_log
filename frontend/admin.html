<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>건강 기록 관리자 페이</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;

            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .admin-container {
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            padding: 32px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.16);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            /* backdrop-filter: blur(10px); */
        }

        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 13px 14px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            outline: none;
            font-size: 16px;
        }
        input:focus {
            border: 2px solid #ffffff;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 10px;
        }

        .notice {
            margin: 24px 0;
            padding: 20px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.15);
            line-height: 1.7;
        }

        .welcome-message {
            margin-bottom: 26px;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            width: 100%;
            margin-bottom: 22px;
        }

        .search-form {
            display: flex;
            width: 100%;
            /* max-width: 560px; */
            gap: 10px;
        }

        .search-form input {
            flex: 1;
            min-width: 0;
            padding: 13px 14px;

            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            outline: none;

            font-size: 16px;
        }

        .search-form input:focus {
            border: 2px solid white;
        }

        button {
            width: 100%;
            margin-top: 10px;
            padding: 14px;
            border: none;
            border-radius: 10px;

            font-size: 17px;
            font-weight: bold;
            cursor: pointer;

            background: white;
            color: #5b4bb7;
        }
        button:hover {
            background: #f1efff;
        }
        button:disabled {
            cursor: not-allowed;
            opacity: 0.65;
        }

        .bottom-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 24px;
        }
        
        #logout-button {
            min-width: 140px;
            padding: 13px 24px;
        
            background: rgba(255, 255, 255, 0.18);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        
        #logout-button:hover {
            background: rgba(255, 255, 255, 0.28);
        }

        .summary-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            margin-bottom: 14px;
        }

        #summary {
            margin: 0;
            font-weight: bold;
        }

        #loading-message {
            margin: 0;
            font-size: 14px;
            opacity: 0.9;
        }

        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            border-radius: 12px;
            background: white;
        }

        table {
            width: 100%;
            min-width: 1900px;
            border-collapse: collapse;
            color: #222;
        }

        th,
        td {
            padding: 13px 12px;
            border-bottom: 1px solid #e7e7e7;

            text-align: center;
            vertical-align: middle;
            white-space: nowrap;
        }

        th {
            position: sticky;
            top: 0;
            z-index: 1;

            background: #5b4bb7;
            color: white;
        }

        tbody tr:hover {
            background: #f5f3ff;
        }

        .name-cell {
            font-weight: bold;
        }

        .memo-cell {
            max-width: 260px;
            overflow: hidden;
            text-align: left;
            text-overflow: ellipsis;
        }

        .empty-cell {
            padding: 36px;
            text-align: center;
            color: #666;
        }

        .status-badge {
            display: inline-block;
            min-width: 64px;
            padding: 6px 10px;
            border-radius: 999px;

            background: #ede9ff;
            color: #5b4bb7;
            font-size: 14px;
            font-weight: bold;
        }

        #error-message {
            min-height: 24px;
            margin-top: 16px;

            color: #ffe2e2;
            font-weight: bold;
        }

        @media (max-width: 760px) {
            body {
                padding: 20px 12px;
            }

            .admin-container {
                padding: 22px;
            }

            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }

            .search-form {
                max-width: none;
            }

            #logout-button {
                width: 100%;
            }

            .summary-area {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>

<body>
    <main class="admin-container">
        <h1>관리자 페이지</h1>

        <p id="welcome-message" class="welcome-message"></p>
        
        <section class="toolbar">
            <form id="search-form" class="search-form">
                <input
                    id="search-name"
                    type="search"
                    placeholder=""
                    autocomplete="off"
                >
        
                <button id="search-button" type="submit">
                    검색
                </button>
            </form>
        </section>

        <section class="summary-area">
            <p id="summary">
                고객 정보를 불러오는 중입니다.
            </p>

            <p id="loading-message"></p>
        </section>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>이름</th>
                        <th>전화번호</th>
                        <th>몸무게</th>
                        <th>키</th>
                        <th>수축기 혈압</th>
                        <th>이완기 혈압</th>
                        <th>공복 혈당</th>
                        <th>BMI</th>
                        <th>BMI 분류</th>
                        <th>혈압 분류</th>
                        <th>당뇨 분류</th>
                        <th>걸음 수</th>
                        <th>수면 시간</th>
                        <th>메모</th>
                    </tr>
                </thead>

                <tbody id="user-table-body">
                </tbody>
            </table>
        </div>

        <p id="error-message"></p>

        <div class="bottom-actions">
            <button id="logout-button" type="button">
                로그아웃
            </button>
        </div>
    </main>

    <script>
        /* 1. 관리자 로그인 정보 확인 */
        const adminUserId = Number(
            sessionStorage.getItem("user_id")
        );

        const adminUserName =
            sessionStorage.getItem("user_name");

        const isAdmin =
            sessionStorage.getItem("is_admin") === "true";

        if (
            !Number.isInteger(adminUserId) ||
            adminUserId <= 0 ||
            !adminUserName
        ) {
            alert("로그인이 필요합니다.");
            sessionStorage.clear();
            window.location.href = "/";

        }
        else if (!isAdmin) {
            alert("관리자만 접근할 수 있습니다.");
            window.location.href = "/survey";

        }
        else {
            document
                .getElementById("welcome-message")
                .textContent =
                    `${adminUserName} 관리자님, 환영합니다.`;
        }

        /* 2. 화면 요소 */
        const searchForm =
            document.getElementById("search-form");

        const searchInput =
            document.getElementById("search-name");

        const searchButton =
            document.getElementById("search-button");

        const tableBody =
            document.getElementById("user-table-body");

        const summaryElement =
            document.getElementById("summary");

        const loadingElement =
            document.getElementById("loading-message");

        const errorElement =
            document.getElementById("error-message");

        /* 3. 화면 표시 보조 함수 */
        function displayValue(value, unit = "") {
            if (
                value === null ||
                value === undefined ||
                value === ""
            ) {
                return "-";
            }

            return `${value}${unit}`;
        }

        function escapeHtml(value) {
            if (
                value === null ||
                value === undefined
            ) {
                return "";
            }

            return String(value)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function formatPhoneNumber(phoneNo) {
            const digits = String(phoneNo || "")
                .replace(/\D/g, "");

            if (digits.length === 11) {
                return digits.replace(
                    /(\d{3})(\d{4})(\d{4})/,
                    "$1-$2-$3"
                );
            }

            if (digits.length === 10) {
                return digits.replace(
                    /(\d{3})(\d{3})(\d{4})/,
                    "$1-$2-$3"
                );
            }

            return phoneNo || "-";
        }

        /* 4. 고객 목록을 표에 출력 */
        function renderUsers(users) {
            if (!Array.isArray(users) || users.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="14" class="empty-cell">
                            검색된 고객이 없습니다.
                        </td>
                    </tr>
                `;
                return;
            }

            tableBody.innerHTML = users
                .map(user => {
                    const escapedMemo =
                        escapeHtml(user.memo);

                    return `
                        <tr>
                            <td class="name-cell">
                                ${escapeHtml(user.name)}
                            </td>

                            <td>
                                ${escapeHtml(
                                    formatPhoneNumber(user.phone_no)
                                )}
                            </td>

                            <td>
                                ${displayValue(user.weight, " kg")}
                            </td>

                            <td>
                                ${displayValue(user.height, " cm")}
                            </td>

                            <td>
                                ${displayValue(
                                    user.systolic,
                                    " mmHg"
                                )}
                            </td>

                            <td>
                                ${displayValue(
                                    user.diastolic,
                                    " mmHg"
                                )}
                            </td>

                            <td>
                                ${displayValue(
                                    user.blood_sugar,
                                    " mg/dL"
                                )}
                            </td>

                            <td>
                                ${displayValue(user.bmi)}
                            </td>

                            <td>
                                <span class="status-badge">
                                    ${displayValue(
                                        user.bmi_category
                                    )}
                                </span>
                            </td>

                            <td>
                                <span class="status-badge">
                                    ${displayValue(
                                        user.blood_pressure_category
                                    )}
                                </span>
                            </td>

                            <td>
                                <span class="status-badge">
                                    ${displayValue(
                                        user.blood_sugar_category
                                    )}
                                </span>
                            </td>

                            <td>
                                ${displayValue(
                                    user.steps,
                                    " 걸음"
                                )}
                            </td>

                            <td>
                                ${displayValue(
                                    user.sleep_hours,
                                    " 시간"
                                )}
                            </td>

                            <td class="memo-cell" title="${escapedMemo}">
                                ${displayValue(escapedMemo)}
                            </td>
                        </tr>
                    `;
                })
                .join("");
        }

        /* 5. 백엔드에서 고객 목록 조회 */
        async function loadUsers(keyword = "") {
            const trimmedKeyword = keyword.trim();

            searchButton.disabled = true;
            loadingElement.textContent =
                "고객 정보를 불러오는 중...";
            errorElement.textContent = "";

            const params = new URLSearchParams({
                admin_user_id: String(adminUserId),
                name: trimmedKeyword
            });

            try {
                const response = await fetch(
                    `/admin/users?${params.toString()}`
                );

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(
                        result.detail ||
                        "고객 정보 조회에 실패했습니다."
                    );
                }

                renderUsers(result.users);

                if (trimmedKeyword) {
                    summaryElement.textContent =
                        `"${trimmedKeyword}" 검색 결과: ` +
                        `${result.total_count}명`;
                }
                else {
                    summaryElement.textContent =
                        `전체 고객: ${result.total_count}명`;
                }

            }
            catch (error) {
                console.error(
                    "관리자 고객 조회 오류:",
                    error
                );

                tableBody.innerHTML = `
                    <tr>
                        <td colspan="14" class="empty-cell">
                            고객 정보를 불러오지 못했습니다.
                        </td>
                    </tr>
                `;

                summaryElement.textContent =
                    "고객 정보 조회 실패";

                errorElement.textContent =
                    error.message;

            }
            finally {
                searchButton.disabled = false;
                loadingElement.textContent = "";
            }
        }

        /* 6. 검색 버튼 */
        searchForm.addEventListener(
            "submit",
            event => {
                event.preventDefault();
                loadUsers(searchInput.value);
            }
        );

        /* 7. 입력할 때마다 300ms 후 자동 검색
         *
         * 이 입력 시:
         * 이%
         *
         * 이준 입력 시:
         * 이준%
         */
        let searchTimer;

        searchInput.addEventListener(
            "input",
            () => {
                clearTimeout(searchTimer);

                searchTimer = setTimeout(
                    () => {
                        loadUsers(searchInput.value);
                    },
                    300
                );
            }
        );

        /* 8. 로그아웃 */
        document
            .getElementById("logout-button")
            .addEventListener("click", () => {
                sessionStorage.clear();
                window.location.href = "/";
            });

        /* 9. 최초 진입 시 전체 고객 조회 */
        loadUsers();
    </script>
</body>
</html>
