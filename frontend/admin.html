<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>건강 기록 입력</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;

            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .admin-container {
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            padding: 32px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.16);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 13px 14px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            outline: none;
            font-size: 16px;
        }
        input:focus {
            border: 2px solid #ffffff;
        }

        h1 {
            margin-top: 0;
        }

        button {
            width: 100%;
            margin-top: 10px;
            padding: 14px;
            border: none;
            border-radius: 10px;

            font-size: 17px;
            font-weight: bold;
            cursor: pointer;

            background: white;
            color: #5b4bb7;
        }
        button:hover {
            background: #f1efff;
        }
        button:disabled {
            cursor: not-allowed;
            opacity: 0.65;
        }
    </style>
</head>

<body>
    <main class="admin-container">
        <h1>관리자 페이지</h1>
    </main>

    <script>
    </script>
</body>
</html>
