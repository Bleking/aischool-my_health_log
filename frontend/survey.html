<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>건강 기록 입력</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;

            font-family: Arial, sans-serif;
            background: #f5f7fb;
            color: #222;
        }

        .container {
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            padding: 32px;
            border-radius: 16px;
            background: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin-top: 0;
        }

        button {
            padding: 11px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <main class="container">
        <h1>건강 기록 입력</h1>

        <p id="welcome-message"></p>

        <p>
            이 영역에 몸무게, 키, 혈압, 혈당 등의
            입력 폼을 추가하면 됩니다.
        </p>

        <button id="logout-button" type="button">
            로그아웃
        </button>
    </main>

    <script>
        const memberId = sessionStorage.getItem("member_id");
        const memberName = sessionStorage.getItem("member_name");

        /*
         * 로그인 정보 없이 /survey 주소로 직접 접근한 경우
         * 로그인 화면으로 되돌립니다.
         */
        if (!memberId || !memberName) {
            alert("로그인이 필요합니다.");
            window.location.href = "/";
        } else {
            document.getElementById(
                "welcome-message"
            ).textContent = `${memberName}님, 환영합니다.`;
        }

        document
            .getElementById("logout-button")
            .addEventListener("click", () => {
                sessionStorage.clear();
                window.location.href = "/";
            });
    </script>
</body>
</html>
