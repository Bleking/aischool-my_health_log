<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>건강 결과</title>

    <style>
        * { box-sizing: border-box; }

        body {
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .result-container {
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            padding: 32px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.16);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            backdrop-filter: blur(10px);
        }

        h1 { margin-top: 0; }

        .summary {
            margin-bottom: 26px;
            line-height: 1.7;
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }

        .result-card {
            min-height: 150px;
            padding: 22px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.28);
        }

        .result-card h2 {
            margin: 0 0 14px;
            font-size: 18px;
        }

        .value {
            margin: 0 0 10px;
            font-size: 30px;
            font-weight: bold;
        }

        .category {
            display: inline-block;
            padding: 7px 12px;
            border-radius: 999px;
            background: white;
            color: #5b4bb7;
            font-weight: bold;
        }

        .notice {
            margin-top: 22px;
            padding: 16px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.14);
            line-height: 1.6;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 24px;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background: white;
            color: #5b4bb7;
        }

        button:hover { background: #f1efff; }

        #logout-button {
            background: rgba(255, 255, 255, 0.18);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        @media (max-width: 620px) {
            .result-grid,
            .button-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <main class="result-container">
        <h1>건강 결과</h1>
        <p id="summary" class="summary"></p>

        <section class="result-grid">
            <article class="result-card">
                <h2>BMI</h2>
                <p id="bmi-value" class="value">-</p>
                <span id="bmi-category" class="category">-</span>
            </article>

            <article class="result-card">
                <h2>혈압</h2>
                <p id="bp-value" class="value">-</p>
                <span id="bp-category" class="category">-</span>
            </article>

            <article class="result-card">
                <h2>공복 혈당</h2>
                <p id="sugar-value" class="value">-</p>
                <span id="sugar-category" class="category">-</span>
            </article>

            <article class="result-card">
                <h2>측정일</h2>
                <p id="date-value" class="value">-</p>
                <span class="category">저장 완료</span>
            </article>
        </section>

        <p class="notice">
            본 결과는 프로젝트 명세의 단순화된 분류 기준에 따른 학습용 결과이며,
            실제 의료 진단을 의미하지 않습니다.
        </p>

        <div class="button-group">
            <button id="again-button" type="button">다시 입력하기</button>
            <button id="logout-button" type="button">로그아웃</button>
        </div>
    </main>

    <script>
        const userId = sessionStorage.getItem("user_id");
        const userName = sessionStorage.getItem("user_name");
        const storedResult = sessionStorage.getItem("health_result");

        if (!userId || !userName) {
            alert("로그인이 필요합니다.");
            window.location.href = "/";
        } else if (!storedResult) {
            alert("확인할 건강 결과가 없습니다.");
            window.location.href = "/survey";
        } else {
            try {
                const result = JSON.parse(storedResult);

                document.getElementById("summary").textContent =
                    `${result.user_name}님의 건강 기록이 정상적으로 저장되었습니다.`;

                document.getElementById("bmi-value").textContent =
                    Number(result.bmi).toFixed(2);

                document.getElementById("bmi-category").textContent =
                    result.bmi_category;

                document.getElementById("bp-value").textContent =
                    `${result.systolic}/${result.diastolic} mmHg`;

                document.getElementById("bp-category").textContent =
                    result.blood_pressure_warning;

                document.getElementById("sugar-value").textContent =
                    `${result.blood_sugar} mg/dL`;

                document.getElementById("sugar-category").textContent =
                    result.blood_sugar_warning;

                document.getElementById("date-value").textContent =
                    result.date;

            } catch (error) {
                console.error(error);
                alert("결과 데이터를 읽는 중 오류가 발생했습니다.");
                window.location.href = "/survey";
            }
        }

        document
            .getElementById("again-button")
            .addEventListener("click", () => {
                sessionStorage.removeItem("health_result");
                window.location.href = "/survey";
            });

        document
            .getElementById("logout-button")
            .addEventListener("click", () => {
                sessionStorage.clear();
                window.location.href = "/";
            });
    </script>
</body>
</html>
